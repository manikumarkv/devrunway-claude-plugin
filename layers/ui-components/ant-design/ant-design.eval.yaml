skill: ant-design
skill_files:
  - layers/ui-components/ant-design/SKILL.md
version: 1

cases:
  - id: antd-01
    name: "Ant Design Form with built-in validation"
    scenario: |
      Write a React form for creating a product with name and price fields
      using Ant Design. Include required validation. Use the ant-design skill rules.
    must_contain:
      - "Form.useForm("
      - "<Form.Item"
      - "rules={["
    must_not_contain:
      - "<form onSubmit="
    rationale: |
      Ant Design Form handles validation, error display, and submission.
      Raw HTML forms miss built-in validation integration.

  - id: antd-02
    name: "Table with dataSource and columns config"
    scenario: |
      Write a React data table for displaying users with name, email, and
      action columns using Ant Design. Use the ant-design skill rules.
    must_contain:
      - "<Table"
      - "dataSource={"
      - "columns={"
    must_not_contain:
      - "<table>"
    rationale: |
      Ant Design Table handles sorting, filtering, and pagination.
      Raw HTML table requires reimplementing all these features.

  - id: antd-03
    name: "ConfigProvider for theming"
    scenario: |
      Write the app-level Ant Design configuration with custom brand colors.
      Use the ant-design skill rules.
    must_contain:
      - "ConfigProvider"
      - "theme={{"
    rationale: |
      ConfigProvider is the Ant Design token-based theming API.
      Overriding individual component props scatters theme values.
