skill: aws-secrets-manager
skill_files:
  - layers/secrets/aws-secrets-manager/SKILL.md
version: 1

cases:
  - id: sm-01
    name: "SecretsManagerClient with caching not per-request fetching"
    scenario: |
      Write a utility that fetches a secret from AWS Secrets Manager with
      caching. Use the aws-secrets-manager skill rules.
    must_contain:
      - "SecretsManagerClient"
      - "GetSecretValueCommand"
    rationale: |
      Secrets Manager has rate limits. Caching the secret value prevents
      throttling on high-traffic services. New client per request wastes connections.

  - id: sm-02
    name: "Secret ARN not name for production references"
    scenario: |
      Write the code that fetches a production database password from Secrets Manager.
      Use the aws-secrets-manager skill rules.
    must_contain:
      - "SecretId:"
    rationale: |
      ARN-based references are unambiguous. Name-based references resolve to
      the same-region secret, which can cause cross-account confusion.

  - id: sm-03
    name: "Rotation lambda handles AWSPENDING and AWSCURRENT stages"
    scenario: |
      Write the skeleton for a Secrets Manager rotation Lambda handler.
      Use the aws-secrets-manager skill rules.
    must_contain:
      - "AWSPENDING"
      - "AWSCURRENT"
    rationale: |
      Rotation lambdas must handle the four rotation stages. Missing
      AWSPENDING or AWSCURRENT stages breaks automatic rotation.
