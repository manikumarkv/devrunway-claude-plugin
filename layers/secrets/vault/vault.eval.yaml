skill: vault-secrets
skill_files:
  - layers/secrets/vault/SKILL.md
version: 1

cases:
  - id: vault-01
    name: "AppRole or Kubernetes auth not root token"
    scenario: |
      Write the Vault authentication setup for a Kubernetes-deployed service.
      Use the vault-secrets skill rules.
    must_contain:
      - "kubernetes/login"
    must_not_contain:
      - "VAULT_TOKEN"
    rationale: |
      Root tokens have unlimited access and do not expire. AppRole and
      Kubernetes auth issue short-lived tokens with least-privilege policies.

  - id: vault-02
    name: "Dynamic database credentials not static"
    scenario: |
      Write the code to fetch dynamic PostgreSQL credentials from Vault.
      Use the vault-secrets skill rules.
    must_contain:
      - "database/creds/"
      - "lease_duration"
    rationale: |
      Dynamic credentials are generated per-request with a TTL.
      Static credentials are long-lived, shared, and hard to rotate.

  - id: vault-03
    name: "Lease renewal for long-running services"
    scenario: |
      Write the code that renews a Vault credential lease before expiry.
      Use the vault-secrets skill rules.
    must_contain:
      - "renewable"
      - "lease_id"
    rationale: |
      Dynamic credentials expire. Long-running services must renew leases
      or fetch new credentials before the TTL expires.
