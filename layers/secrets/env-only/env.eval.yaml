skill: env-secrets
skill_files:
  - layers/secrets/env-only/SKILL.md
version: 1

cases:
  - id: env-01
    name: "Environment variables validated with Zod at startup"
    scenario: |
      Write the env validation module that checks required environment
      variables at app startup. Use the env-secrets skill rules.
    must_contain:
      - "z.object("
      - "process.env"
      - ".parse(process.env)"
    rationale: |
      Zod validation at startup catches missing env vars immediately.
      Accessing process.env.VAR without validation fails silently at runtime.

  - id: env-02
    name: "No secrets in VITE_ prefixed variables"
    scenario: |
      Write the env configuration showing public and private variables
      for a Vite/React + Node.js app. Use the env-secrets skill rules.
    must_contain:
      - "VITE_"
    must_not_contain:
      - "VITE_API_SECRET"
      - "VITE_DB_"
    rationale: |
      VITE_ variables are bundled into the client JavaScript — publicly
      visible to anyone. Never prefix secrets with VITE_.

  - id: env-03
    name: ".env.example committed and .env gitignored"
    scenario: |
      Show the project setup for environment variable management.
      Use the env-secrets skill rules.
    must_contain:
      - ".env.example"
      - ".gitignore"
    rationale: |
      .env.example documents required variables without values.
      .env must be in .gitignore so real secrets are never committed.
