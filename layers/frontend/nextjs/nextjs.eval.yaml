skill: nextjs-standards
skill_files:
  - layers/frontend/nextjs/SKILL.md
version: 1

cases:
  - id: next-01
    name: "Server Components are the default in App Router"
    scenario: |
      Write a Next.js page that displays a list of products fetched from the
      database. Use the nextjs-standards skill rules.
    must_contain:
      - "async function"
    must_not_contain:
      - "getServerSideProps"
      - "getStaticProps"
    rationale: |
      Next.js App Router uses Server Components by default. getServerSideProps
      and getStaticProps are Pages Router patterns — wrong in App Router.

  - id: next-02
    name: "layout.tsx is a Server Component — no 'use client'"
    scenario: |
      Write a Next.js app/layout.tsx that wraps children with a shared
      navigation bar. Use the nextjs-standards skill rules.
    must_not_contain:
      - "'use client'"
      - "getServerSideProps"
    rationale: |
      layout.tsx is a Server Component by default. Adding 'use client' to a
      layout forces the entire subtree into client rendering and loses RSC benefits.

  - id: next-06
    name: "Interactive components use 'use client' directive"
    scenario: |
      Write a Next.js counter button component that increments a count on click.
      Use the nextjs-standards skill rules.
    must_contain:
      - "'use client'"
      - "useState"
    rationale: |
      Components that use React hooks or browser event handlers must be marked
      with 'use client' to opt into the Client Components model.

  - id: next-03
    name: "Server Actions for form mutations"
    scenario: |
      Write a Next.js form that creates a new product using a Server Action.
      Use the nextjs-standards skill rules.
    must_contain:
      - "'use server'"
      - "revalidatePath("
    must_not_contain:
      - "fetch('/api/"
    rationale: |
      Server Actions handle form mutations without client-side fetch calls.
      revalidatePath invalidates the cache so the UI reflects the mutation.
